name: macOS FileProvider Testing-Mode Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose macOS CLI tarball supplies tcfs/tcfsd"
        required: true
        default: "v0.12.6"
        type: string

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.93.0

jobs:
  build-testing-mode-pkg:
    name: Build testing-mode .pkg
    if: github.repository == 'Jesssullivan/tummycrypt'
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Validate inputs and secrets
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64: ${{ secrets.TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64 }}
          TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          [[ "$TAG" == v* ]] || {
            echo "::error::tag must start with 'v' (got '$TAG')"
            exit 1
          }

          missing=()
          for name in \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_INSTALLER_CERTIFICATE_BASE64 \
            APPLE_INSTALLER_CERTIFICATE_PASSWORD \
            TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64 \
            TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required testing-mode package secrets: ${missing[*]}"
            echo "Set a host provisioning profile that grants com.apple.developer.fileprovider.testing-mode before running this workflow."
            exit 1
          fi

          {
            echo "TAG=$TAG"
            echo "VERSION=${TAG#v}"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Build staticlib
        shell: bash
        run: cargo build -p tcfs-file-provider --release --no-default-features --features grpc

      - name: Import signing certificates
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_CA_G2: ${{ secrets.APPLE_DEVELOPER_ID_CA_G2 }}
          APPLE_WWDR_CA_G2: ${{ secrets.APPLE_WWDR_CA_G2 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/testing-mode-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > "$RUNNER_TEMP/app-cert.p12"
          security import "$RUNNER_TEMP/app-cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/app-cert.p12"

          echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 -d > "$RUNNER_TEMP/installer-cert.p12"
          security import "$RUNNER_TEMP/installer-cert.p12" \
            -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/installer-cert.p12"

          if [[ -n "$APPLE_DEVELOPER_ID_CA_G2" ]]; then
            echo "$APPLE_DEVELOPER_ID_CA_G2" | base64 -d > "$RUNNER_TEMP/developer-id-ca.cer"
            security import "$RUNNER_TEMP/developer-id-ca.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
            rm "$RUNNER_TEMP/developer-id-ca.cer"
          fi
          if [[ -n "$APPLE_WWDR_CA_G2" ]]; then
            echo "$APPLE_WWDR_CA_G2" | base64 -d > "$RUNNER_TEMP/wwdr.cer"
            security import "$RUNNER_TEMP/wwdr.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/productsign
            rm "$RUNNER_TEMP/wwdr.cer"
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/' || true)"
          PKG_SIGNING_IDENTITY="$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep "Developer ID Installer" | head -1 \
            | sed 's/.*"\(.*\)".*/\1/' || true)"

          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::No Developer ID Application identity found"
            exit 1
          fi
          if [[ -z "$PKG_SIGNING_IDENTITY" ]]; then
            echo "::error::No Developer ID Installer identity found"
            exit 1
          fi

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "PKG_SIGNING_IDENTITY=$PKG_SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Import FileProvider testing-mode profiles
        shell: bash
        env:
          TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64: ${{ secrets.TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64 }}
          TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          HOST_PROFILE="$RUNNER_TEMP/tcfs-host-testing-mode-developer-id.provisionprofile"
          EXTENSION_PROFILE="$RUNNER_TEMP/tcfs-fileprovider-developer-id.provisionprofile"
          HOST_PROFILE_PLIST="$RUNNER_TEMP/tcfs-host-testing-mode-developer-id.plist"
          mkdir -p "$RUNNER_TEMP"

          echo "$TCFS_HOST_TESTING_MODE_PROVISIONING_PROFILE_BASE64" | base64 -d > "$HOST_PROFILE"
          echo "$TCFS_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 -d > "$EXTENSION_PROFILE"

          security cms -D -i "$HOST_PROFILE" > "$HOST_PROFILE_PLIST"
          security cms -D -i "$EXTENSION_PROFILE" >/dev/null

          if ! /usr/libexec/PlistBuddy \
            -c 'Print :Entitlements:com.apple.developer.fileprovider.testing-mode' \
            "$HOST_PROFILE_PLIST" | grep -Fxq 'true'; then
            echo "::error::host testing-mode provisioning profile does not grant com.apple.developer.fileprovider.testing-mode"
            exit 1
          fi

          scripts/macos-fileprovider-profile-inventory.sh \
            --profiles-dir "$RUNNER_TEMP" \
            --strict

          {
            echo "TCFS_HOST_PROVISIONING_PROFILE=$HOST_PROFILE"
            echo "TCFS_EXTENSION_PROVISIONING_PROFILE=$EXTENSION_PROFILE"
            echo "TCFS_REQUIRE_PRODUCTION_SIGNING=1"
            echo "TCFS_FILEPROVIDER_TESTING_MODE_ENTITLEMENT=1"
          } >> "$GITHUB_ENV"

      - name: Build FileProvider app
        shell: bash
        run: |
          set -euo pipefail
          HEADER="$(find target -name tcfs_file_provider.h -path '*/tcfs-file-provider*/out/*' -print -quit)"
          if [[ -z "$HEADER" ]]; then
            echo "::error::cbindgen header not found"
            find target/release/build -name '*.h' 2>/dev/null || true
            exit 1
          fi

          swift/fileprovider/build.sh \
            target/release \
            "$HEADER" \
            build/ \
            "$SIGNING_IDENTITY"

      - name: Verify FileProvider signing and testing entitlement
        shell: bash
        run: |
          set -euo pipefail
          scripts/macos-fileprovider-preflight.sh \
            --signing-only \
            --require-production-signing \
            --app-path build/TCFSProvider.app

          codesign -d --entitlements :- build/TCFSProvider.app \
            > "$RUNNER_TEMP/host-entitlements.plist" \
            2> "$RUNNER_TEMP/host-entitlements.err"

          if ! grep -Fq 'com.apple.developer.fileprovider.testing-mode' "$RUNNER_TEMP/host-entitlements.plist"; then
            echo "::error::built host app is missing com.apple.developer.fileprovider.testing-mode"
            cat "$RUNNER_TEMP/host-entitlements.plist"
            exit 1
          fi

      - name: Notarize FileProvider app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          swift/fileprovider/notarize.sh build/TCFSProvider.app \
            || echo "::warning::FileProvider testing-mode app notarization failed (non-fatal)"

      - name: Archive FileProvider app
        shell: bash
        run: |
          set -euo pipefail
          cd build
          /usr/bin/ditto -c -k --keepParent TCFSProvider.app \
            "TCFSProvider-${VERSION}-macos-aarch64-fileprovider-testing-mode.zip"

      - name: Download release CLI tarball
        shell: bash
        run: |
          set -euo pipefail
          curl -fL \
            -o "$RUNNER_TEMP/tcfs-${VERSION}-macos-aarch64.tar.gz" \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/tcfs-${VERSION}-macos-aarch64.tar.gz"

      - name: Build testing-mode .pkg
        shell: bash
        run: |
          set -euo pipefail
          scripts/macos-build-pkg.sh \
            --version "$VERSION" \
            --cli-tar "$RUNNER_TEMP/tcfs-${VERSION}-macos-aarch64.tar.gz" \
            --fileprovider-zip "build/TCFSProvider-${VERSION}-macos-aarch64-fileprovider-testing-mode.zip" \
            --output "tcfs-${VERSION}-macos-aarch64-fileprovider-testing-mode.pkg" \
            --sign "$PKG_SIGNING_IDENTITY"

      - name: Notarize testing-mode .pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          PKG="tcfs-${VERSION}-macos-aarch64-fileprovider-testing-mode.pkg"
          if xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARIZE_PASSWORD" \
            --wait; then
            xcrun stapler staple "$PKG" \
              || echo "::warning::testing-mode .pkg stapling failed (non-fatal)"
          else
            echo "::warning::testing-mode .pkg notarization failed (non-fatal)"
          fi

      - name: Verify testing-mode package structure
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/macos-pkg-structure-smoke.sh \
            --pkg "tcfs-${VERSION}-macos-aarch64-fileprovider-testing-mode.pkg" \
            --require-signature \
            --expected-postinstall scripts/macos-pkg-postinstall.sh

      - name: Upload testing-mode package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-testing-mode-pkg
          path: |
            tcfs-*-macos-aarch64-fileprovider-testing-mode.pkg
            build/TCFSProvider-*-macos-aarch64-fileprovider-testing-mode.zip
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
