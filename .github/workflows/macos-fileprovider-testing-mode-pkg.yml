name: macOS FileProvider Testing-Mode Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose macOS CLI tarball supplies tcfs/tcfsd"
        required: true
        default: "v0.12.7"
        type: string
      runner_label:
        description: "Registered self-hosted Mac runner label"
        required: true
        default: "petting-zoo-mini"
        type: string
      signing_identity:
        description: "Apple Development codesigning identity, or auto-development"
        required: false
        default: "auto-development"
        type: string
      signing_keychain:
        description: "Optional local keychain to search for Apple Development identity"
        required: false
        default: "~/Library/Keychains/login.keychain-db"
        type: string
      profiles_dir:
        description: "Optional local provisioning profile directory on the runner"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: 1.93.0
  GIT_CONFIG_GLOBAL: /tmp/tcfs-fileprovider-lab-gitconfig
  GIT_CONFIG_NOSYSTEM: "1"

jobs:
  build-testing-mode-pkg:
    name: Build testing-mode .pkg
    if: github.repository == 'Jesssullivan/tummycrypt'
    runs-on: ${{ github.event.inputs.runner_label }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Validate inputs and runner
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          RUNNER_LABEL="${{ github.event.inputs.runner_label }}"
          [[ "$TAG" == v* ]] || {
            echo "::error::tag must start with 'v' (got '$TAG')"
            exit 1
          }

          case "$RUNNER_LABEL" in
            macos-*|ubuntu-*|windows-*)
              echo "::error::FileProvider testing-mode must run on a registered self-hosted Mac, not $RUNNER_LABEL"
              exit 1
              ;;
          esac

          {
            echo "TAG=$TAG"
            echo "VERSION=${TAG#v}"
            echo "TCFS_FILEPROVIDER_TESTING_MODE_ENTITLEMENT=1"
            echo "TCFS_REQUIRE_PRODUCTION_SIGNING=1"
            echo "TCFS_CODESIGN_TIMESTAMP=0"
          } >> "$GITHUB_ENV"

      - name: Expose existing Rust toolchain manager
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x "$HOME/.cargo/bin/rustup" ]]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Build staticlib
        shell: bash
        run: cargo build -p tcfs-file-provider --release --no-default-features --features grpc

      - name: Resolve local Apple Development signing assets
        shell: bash
        run: |
          set -euo pipefail
          SIGNING_IDENTITY_INPUT="${{ github.event.inputs.signing_identity }}"
          SIGNING_KEYCHAIN_INPUT="${{ github.event.inputs.signing_keychain }}"
          PROFILES_DIR_INPUT="${{ github.event.inputs.profiles_dir }}"
          profile_args=()
          identity_args=()

          if [[ -n "$SIGNING_KEYCHAIN_INPUT" ]]; then
            case "$SIGNING_KEYCHAIN_INPUT" in
              "~/"*) SIGNING_KEYCHAIN="${HOME}/${SIGNING_KEYCHAIN_INPUT#"~/"}" ;;
              *) SIGNING_KEYCHAIN="$SIGNING_KEYCHAIN_INPUT" ;;
            esac
            if [[ ! -f "$SIGNING_KEYCHAIN" ]]; then
              echo "::error::signing_keychain does not exist: $SIGNING_KEYCHAIN"
              exit 1
            fi
            identity_args+=("$SIGNING_KEYCHAIN")
          else
            SIGNING_KEYCHAIN=""
          fi

          find_identities() {
            security find-identity -v -p codesigning "${identity_args[@]}"
          }

          if [[ -n "$PROFILES_DIR_INPUT" ]]; then
            case "$PROFILES_DIR_INPUT" in
              "~/"*) PROFILES_DIR="${HOME}/${PROFILES_DIR_INPUT#"~/"}" ;;
              *) PROFILES_DIR="$PROFILES_DIR_INPUT" ;;
            esac
            profile_args+=(--profiles-dir "$PROFILES_DIR")
          fi

          case "$SIGNING_IDENTITY_INPUT" in
            auto-development)
              SIGNING_IDENTITY="$(find_identities \
                | grep "Apple Development" | head -1 \
                | sed 's/.*"\(.*\)".*/\1/' || true)"
              ;;
            auto)
              echo "::error::Developer ID auto-detection is not valid for the testing-mode lane; use auto-development or an Apple Development identity"
              exit 1
              ;;
            *)
              SIGNING_IDENTITY="$SIGNING_IDENTITY_INPUT"
              ;;
          esac

          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::No Apple Development signing identity found on this runner"
            find_identities || true
            exit 1
          fi

          if ! find_identities \
            | grep -F "\"$SIGNING_IDENTITY\"" >/dev/null; then
            echo "::error::Signing identity is not available in this runner keychain: $SIGNING_IDENTITY"
            find_identities || true
            exit 1
          fi

          if ! PROFILE_ENV="$(bash scripts/macos-fileprovider-profile-inventory.sh \
              "${profile_args[@]}" \
              --env-only \
              --strict \
              --require-host-entitlement com.apple.developer.fileprovider.testing-mode)"; then
            echo "::error::No local host/extension provisioning profile pair grants FileProvider testing mode"
            bash scripts/macos-fileprovider-profile-inventory.sh \
              "${profile_args[@]}" \
              --require-host-entitlement com.apple.developer.fileprovider.testing-mode \
              || true
            exit 1
          fi
          eval "$PROFILE_ENV"

          bash scripts/macos-fileprovider-profile-inventory.sh \
            "${profile_args[@]}" \
            --strict \
            --require-host-entitlement com.apple.developer.fileprovider.testing-mode

          {
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "TCFS_HOST_PROVISIONING_PROFILE=$TCFS_HOST_PROVISIONING_PROFILE"
            echo "TCFS_EXTENSION_PROVISIONING_PROFILE=$TCFS_EXTENSION_PROVISIONING_PROFILE"
            echo "TCFS_REQUIRE_PRODUCTION_SIGNING=1"
            echo "TCFS_FILEPROVIDER_TESTING_MODE_ENTITLEMENT=1"
            echo "TCFS_CODESIGN_TIMESTAMP=0"
            if [[ -n "$SIGNING_KEYCHAIN" ]]; then
              echo "TCFS_CODESIGN_KEYCHAIN=$SIGNING_KEYCHAIN"
            fi
          } >> "$GITHUB_ENV"

      - name: Build FileProvider app
        shell: bash
        run: |
          set -euo pipefail
          HEADER="$(find target -name tcfs_file_provider.h -path '*/tcfs-file-provider*/out/*' -print -quit)"
          if [[ -z "$HEADER" ]]; then
            echo "::error::cbindgen header not found"
            find target/release/build -name '*.h' 2>/dev/null || true
            exit 1
          fi

          swift/fileprovider/build.sh \
            target/release \
            "$HEADER" \
            build/ \
            "$SIGNING_IDENTITY"

      - name: Verify FileProvider signing and testing entitlement
        shell: bash
        run: |
          set -euo pipefail
          scripts/macos-fileprovider-preflight.sh \
            --signing-only \
            --require-production-signing \
            --app-path build/TCFSProvider.app

          codesign -d --entitlements :- build/TCFSProvider.app \
            > "$RUNNER_TEMP/host-entitlements.plist" \
            2> "$RUNNER_TEMP/host-entitlements.err"

          if ! grep -Fq 'com.apple.developer.fileprovider.testing-mode' "$RUNNER_TEMP/host-entitlements.plist"; then
            echo "::error::built host app is missing com.apple.developer.fileprovider.testing-mode"
            cat "$RUNNER_TEMP/host-entitlements.plist"
            exit 1
          fi

      - name: Archive FileProvider app
        shell: bash
        run: |
          set -euo pipefail
          cd build
          /usr/bin/ditto -c -k --keepParent TCFSProvider.app \
            "TCFSProvider-${VERSION}-macos-aarch64-fileprovider-testing-mode.zip"

      - name: Download release CLI tarball
        shell: bash
        run: |
          set -euo pipefail
          curl -fL \
            -o "$RUNNER_TEMP/tcfs-${VERSION}-macos-aarch64.tar.gz" \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/tcfs-${VERSION}-macos-aarch64.tar.gz"

      - name: Build testing-mode .pkg
        shell: bash
        run: |
          set -euo pipefail
          scripts/macos-build-pkg.sh \
            --version "$VERSION" \
            --cli-tar "$RUNNER_TEMP/tcfs-${VERSION}-macos-aarch64.tar.gz" \
            --fileprovider-zip "build/TCFSProvider-${VERSION}-macos-aarch64-fileprovider-testing-mode.zip" \
            --output "tcfs-${VERSION}-macos-aarch64-fileprovider-testing-mode.pkg"

      - name: Verify testing-mode package structure
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/macos-pkg-structure-smoke.sh \
            --pkg "tcfs-${VERSION}-macos-aarch64-fileprovider-testing-mode.pkg" \
            --expected-postinstall scripts/macos-pkg-postinstall.sh

      - name: Upload testing-mode package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-testing-mode-pkg
          path: |
            tcfs-*-macos-aarch64-fileprovider-testing-mode.pkg
            build/TCFSProvider-*-macos-aarch64-fileprovider-testing-mode.zip
          retention-days: 7
