# -- Global values shared across all sub-charts
global:
  # -- Kubernetes namespace for tcfs resources
  namespace: tcfs

  # -- Existing SeaweedFS S3-compatible endpoint. This umbrella chart does not
  # -- deploy SeaweedFS.
  seaweedfsEndpoint: "http://seaweedfs.tcfs.svc.cluster.local:8333"

  # -- NATS server URL
  natsUrl: "nats://nats:4222"

  # -- Default container image tag passed through to tcfs-backend. Mutable
  # -- convenience default only; set an explicit tag such as v0.12.12 for release
  # -- proof or production runs.
  imageTag: "latest"

  # -- Default replica count for tcfs workloads
  replicaCount: 2

  # -- Default resource requests applied to tcfs pods
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# -- Existing SeaweedFS S3 credentials (populate via --set or sealed-secrets).
# -- The generated Secret includes both AWS-style keys and the key names that
# -- tcfs-backend consumes directly.
seaweedfs:
  # -- S3 access key ID
  accessKeyId: ""
  # -- S3 secret access key
  secretAccessKey: ""
  # -- Name of the Kubernetes Secret for SeaweedFS credentials
  secretName: tcfs-seaweedfs-secret

# -- Create the target namespace if it does not exist
createNamespace: true

# -------------------------------------------------------
# tcfs-backend (local sub-chart, always installed)
# -------------------------------------------------------
tcfs-backend:
  credentialsSecret: tcfs-seaweedfs-secret
  metrics:
    serviceMonitor:
      # kube-prometheus-stack is disabled by default, so do not render a
      # ServiceMonitor unless an operator enables the monitoring CRDs.
      enabled: false

# -------------------------------------------------------
# NATS (optional dependency)
# -------------------------------------------------------
nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: true
      memStorage:
        size: 256Mi
      fileStorage:
        size: 1Gi

# -------------------------------------------------------
# KEDA (optional dependency)
# -------------------------------------------------------
keda:
  enabled: true

# -------------------------------------------------------
# kube-prometheus-stack (optional dependency)
# -------------------------------------------------------
kube-prometheus-stack:
  enabled: false
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
  grafana:
    enabled: false
