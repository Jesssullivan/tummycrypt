exclude = [
  "^https://github.com/tinyland-inc/tummycrypt/compare",
  "^https://github.com/tinyland-inc/remote-juggler",
  "^https://nix-cache.fuzzy-dev.tinyland.dev",
  "^https://docs.tummycrypt.io",
  "^https://developer.apple.com/documentation/fskit$",
  "^https://developer.apple.com/documentation/fileprovider$",
  "^https://developer.apple.com/documentation/fileprovider/nsfileproviderreplicatedextension$",
  # GitHub Actions job subpages intermittently return 502 to hosted link checks;
  # keep run-level links checked, but do not fail docs CI on job-page flakiness.
  "^https://github.com/Jesssullivan/tummycrypt/actions/runs/.*/job/",
  # Debian package pages intermittently return 503 to GitHub-hosted link checks.
  "^https://packages.debian.org/",
  "your-org",
  "localhost",
  "127\\.0\\.0\\.1",
  "192\\.168\\.",
  "dees-appu-bearts",
  "seaweedfs.tcfs.svc",
  "nats.tcfs.tummycrypt.dev",
  "seaweedfs.example.com",
  "nats.example.com",
  "filer.example.com",
  "example.com",
  "^https://developer.apple.com/videos",
]
# The archive index remains a checked, published navigation surface. These
# dated snapshots are still published because current operator records cite
# them, but their own historical relative links intentionally remain frozen.
exclude_path = [
  "docs/archive/next-workstream-queue-2026-05-09.md",
  "docs/archive/tinyland-branch-prune-proposal-2026-05-09.md",
  "docs/archive/tinyland-upstream-disposition-2026-04-17.md",
  "docs/archive/usage-reality-sprint-plan-2026-05-06.md",
  "docs/archive/workstream-reality-check-2026-05-09.md",
]
# lychee 0.24+ replaced the boolean with an explicit fragment-check mode.
include_fragments = "anchor-only"
max_concurrency = 8
timeout = 30
