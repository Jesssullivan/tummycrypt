# NATS Server Configuration for TCFS Fleet Sync
#
# CRITICAL: sync_always MUST be true to prevent acknowledged-write loss
# under power failure. See Jepsen NATS JetStream analysis (Dec 2025).

jetstream {
    store_dir: /var/lib/nats/jetstream
    max_mem: 1G
    max_file: 10G

    # Force fsync on every write — prevents data loss on power failure.
    # Without this, NATS may acknowledge writes that haven't been fsynced,
    # leading to message loss if the server crashes.
    sync_always: true
}

