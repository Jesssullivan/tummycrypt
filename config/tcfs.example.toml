# tcfs.example.toml
# Full annotated configuration reference for tcfsd
# Copy to /etc/tcfs/config.toml or ~/.config/tcfs/config.toml and customize.
# Environment variables override file settings (prefix: TCFS_).

[daemon]
# Unix domain socket for gRPC (CLI <-> daemon communication)
socket = "/run/tcfsd/tcfsd.sock"
# Plaintext TCP is refused. Tunnel the owner-only Unix socket over SSH.
# listen = "127.0.0.1:7777" # legacy; tcfsd will fail closed
# Prometheus metrics endpoint
metrics_addr = "127.0.0.1:9100"
log_level = "info"       # trace, debug, info, warn, error
log_format = "json"      # json, text

[storage]
# Local docker-compose SeaweedFS endpoint. Plaintext is accepted only because
# this repository-managed development config opts in explicitly below.
endpoint = "http://localhost:8333"
enforce_tls = false
# Production must use an authenticated HTTPS endpoint and enforce_tls = true.
# endpoint = "https://seaweedfs.example.com:8333"
# enforce_tls = true
# ca_cert_path = "/etc/tcfs/certs/seaweedfs-ca.pem"
region = "us-east-1"
bucket = "tcfs"
# Path to SOPS-encrypted credential file (loaded at startup)
credentials_file = "/etc/tcfs/credentials.yaml"
# Alternatively: set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars

[secrets]
# Age identity file for SOPS decryption
# Defaults to: $CREDENTIALS_DIRECTORY/age-identity → $SOPS_AGE_KEY_FILE → $SOPS_AGE_KEY → ~/.config/sops/age/keys.txt
# age_identity = "/etc/tcfs/age-identity.txt"
# Optional KDBX database for credential lookup (RemoteJuggler integration)
# kdbx_path = "/home/user/.passwords.kdbx"
# SOPS credentials directory (defaults to credentials/ in repo)
# sops_dir = "/etc/tcfs/credentials"

[sync]
# NATS JetStream endpoint
nats_url = "nats://localhost:4222"
# RocksDB local state cache (tracks file hashes + sync state)
state_db = "/var/lib/tcfsd/state.db"
# Trusted parent for daemon-enrolled, isolated root caches. Set this for system
# daemons because the socket parent (/run/tcfsd) is not persistent. The same
# applies to systemd user sockets under %t.
root_state_dir = "/var/lib/tcfsd/reconcile"
# Sync worker threads (0 = auto-detect CPU count)
workers = 0
# Retry limit for failed tasks before moving to DLQ
max_retries = 3

# Strategy-A stable-root routing (optional). Clients send only the table ID;
# tcfsd selects and fences every path/prefix below from this trusted config.
# `inspect-only` permits conflict listing and keep-both dry-run. Change to
# `resolve` only for a root approved for attended repo-group execution.
#
# [sync.roots.git-roam-tool-daemon]
# local_root = "/home/user/git/tinyland-tool-daemon"
# remote_prefix = "git-roam/tool-daemon"
# state_path = "/var/lib/tcfsd/reconcile/git-roam-tool-daemon.json"
# policy = "inspect-only"

[fuse]
# Negative dentry cache TTL in seconds (important for git performance)
# Set higher (120+) for large repos with many untracked files
negative_cache_ttl_secs = 30
# Disk cache for partially-downloaded files (sparse files)
cache_dir = "/var/cache/tcfsd"
# Maximum disk cache size in MB (evict LRU when exceeded)
cache_max_mb = 10240
