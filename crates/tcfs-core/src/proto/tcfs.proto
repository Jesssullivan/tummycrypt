syntax = "proto3";
package tcfs;

// TcfsDaemon: local control plane served by tcfsd over Unix socket
service TcfsDaemon {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Mount(MountRequest) returns (MountResponse);
  rpc Unmount(UnmountRequest) returns (UnmountResponse);
  rpc Push(stream PushChunk) returns (stream PushProgress);
  rpc Pull(PullRequest) returns (stream PullProgress);
  // Called by FUSE driver on open() of a .tc stub
  rpc Hydrate(HydrateRequest) returns (stream HydrateProgress);
  rpc Unsync(UnsyncRequest) returns (UnsyncResponse);
  rpc SyncStatus(SyncStatusRequest) returns (SyncStatusResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc Watch(WatchRequest) returns (stream WatchEvent);
  rpc CredentialStatus(Empty) returns (CredentialStatusResponse);
  rpc ResolveConflict(ResolveConflictRequest) returns (ResolveConflictResponse);
  rpc AuthUnlock(AuthUnlockRequest) returns (AuthUnlockResponse);
  rpc AuthLock(Empty) returns (AuthLockResponse);
  rpc AuthStatus(Empty) returns (AuthStatusResponse);
  // MFA enrollment and verification
  rpc AuthEnroll(AuthEnrollRequest) returns (AuthEnrollResponse);
  rpc AuthCompleteEnroll(AuthCompleteEnrollRequest) returns (AuthCompleteEnrollResponse);
  rpc AuthChallenge(AuthChallengeRequest) returns (AuthChallengeResponse);
  rpc AuthVerify(AuthVerifyRequest) returns (AuthVerifyResponse);
  // Session management
  rpc AuthRevoke(AuthRevokeRequest) returns (AuthRevokeResponse);
  // Device enrollment via invite
  rpc DeviceEnroll(DeviceEnrollRequest) returns (DeviceEnrollResponse);
}

message Empty {}

message StatusRequest {}
message StatusResponse {
  string version = 1;
  string storage_endpoint = 2;
  bool storage_ok = 3;
  bool nats_ok = 4;
  int32 active_mounts = 5;
  int64 uptime_secs = 6;
  string device_id = 7;
  string device_name = 8;
  string conflict_mode = 9;
}

message MountRequest {
  string remote = 1;
  string mountpoint = 2;
  bool read_only = 3;
  repeated string options = 4;
}
message MountResponse {
  bool success = 1;
  string error = 2;
}

message UnmountRequest {
  string mountpoint = 1;
}
message UnmountResponse {
  bool success = 1;
  string error = 2;
}

message PushChunk {
  string path = 1;
  bytes data = 2;
  uint64 offset = 3;
  bool last = 4;
}
message PushProgress {
  uint64 bytes_sent = 1;
  uint64 total_bytes = 2;
  string chunk_hash = 3;
  bool done = 4;
  string error = 5;
}

message PullRequest {
  string remote_path = 1;
  string local_path = 2;
}
message PullProgress {
  uint64 bytes_received = 1;
  uint64 total_bytes = 2;
  bool done = 3;
  string error = 4;
}

message HydrateRequest {
  string stub_path = 1;
  bool partial_ok = 2;
}
message HydrateProgress {
  uint64 bytes_received = 1;
  uint64 total_bytes = 2;
  string local_path = 3;
  bool done = 4;
  string error = 5;
}

message UnsyncRequest {
  string path = 1;
  bool force = 2;
}
message UnsyncResponse {
  bool success = 1;
  string stub_path = 2;
  string error = 3;
}

message SyncStatusRequest {
  string path = 1;
}
message SyncStatusResponse {
  string path = 1;
  string state = 2;
  string blake3 = 3;
  uint64 size = 4;
  int64 last_synced = 5;
}

message ListFilesRequest {
  string prefix = 1;
}
message ListFilesResponse {
  repeated FileEntry files = 1;
}
message FileEntry {
  string path = 1;
  string filename = 2;
  uint64 size = 3;
  int64 last_synced = 4;
  bool is_directory = 5;
  string blake3 = 6;
}

message WatchRequest {
  repeated string paths = 1;
  // Only return events newer than this timestamp (0 = all events).
  // Maps to FileProvider sync anchor for incremental enumeration.
  int64 since_timestamp = 2;
}
message WatchEvent {
  string path = 1;
  string event_type = 2;      // "created", "modified", "deleted", "renamed"
  int64 timestamp = 3;
  // Enriched metadata (populated from state cache when available)
  string filename = 4;
  uint64 size = 5;
  string blake3 = 6;
  bool is_directory = 7;
  string device_id = 8;       // Origin device for remote (NATS) events
}

message CredentialStatusResponse {
  bool loaded = 1;
  string source = 2;
  int64 loaded_at = 3;
  bool needs_reload = 4;
}

message ResolveConflictRequest {
  string path = 1;
  string resolution = 2;
}
message ResolveConflictResponse {
  bool success = 1;
  string resolved_path = 2;
  string error = 3;
}

message AuthUnlockRequest {
  // Raw 32-byte master key (loaded from file by the CLI)
  bytes master_key = 1;
}
message AuthUnlockResponse {
  bool success = 1;
  string error = 2;
}

message AuthLockResponse {
  bool success = 1;
  string error = 2;
}

message AuthStatusResponse {
  bool unlocked = 1;
  bool crypto_enabled = 2;
  string session_device_id = 3;
  string auth_method = 4;
  repeated string available_methods = 5;
}

// MFA enrollment: register a new auth credential (TOTP secret, WebAuthn key)
message AuthEnrollRequest {
  string device_id = 1;
  string method = 2;           // "totp", "webauthn"
}
message AuthEnrollResponse {
  bool success = 1;
  bytes registration_data = 2; // JSON: { secret, qr_uri, qr_svg } for TOTP
  string instructions = 3;
  string error = 4;
}

// MFA enrollment completion (WebAuthn second step: attestation → credential)
message AuthCompleteEnrollRequest {
  string device_id = 1;
  string method = 2;             // "webauthn"
  bytes attestation_data = 3;    // RegisterPublicKeyCredential JSON
}
message AuthCompleteEnrollResponse {
  bool success = 1;
  string error = 2;
}

// MFA challenge: request a challenge for authentication
message AuthChallengeRequest {
  string device_id = 1;
  string method = 2;           // "totp", "webauthn"
}
message AuthChallengeResponse {
  string challenge_id = 1;
  bytes data = 2;              // Provider-specific challenge data
  string prompt = 3;
  uint64 expires_at = 4;
}

// MFA verify: submit response to a challenge
message AuthVerifyRequest {
  string challenge_id = 1;
  string device_id = 2;
  bytes data = 3;              // TOTP: 6-digit code, WebAuthn: assertion JSON
}
message AuthVerifyResponse {
  bool success = 1;
  string session_token = 2;
  string error = 3;
}

// Session revocation: revoke by token or device_id
message AuthRevokeRequest {
  string session_token = 1;   // Revoke specific session (if set)
  string device_id = 2;       // Revoke all sessions for device (if set, token empty)
}
message AuthRevokeResponse {
  bool success = 1;
  string error = 2;
}

// Device enrollment via invite
message DeviceEnrollRequest {
  string invite_data = 1;      // Base64-encoded EnrollmentInvite
  string device_name = 2;
  string public_key = 3;       // age X25519 public key
  string platform = 4;         // "macos-aarch64", "ios", "linux-x86_64"
}
message DeviceEnrollResponse {
  bool success = 1;
  string device_id = 2;
  string nats_url = 3;
  string storage_endpoint = 4;
  repeated string available_auth_methods = 5;
  string error = 6;
}
