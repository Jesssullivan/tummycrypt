name: TCFS
options:
  bundleIdPrefix: io.tinyland.tcfs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: QP994XQKNH
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution: John Sullivan (QP994XQKNH)"
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.9.3"
    CURRENT_PROJECT_VERSION: "2"

targets:
  TCFS:
    type: application
    platform: iOS
    sources:
      - path: HostApp
      - path: Generated
      - path: Resources/Assets.xcassets
    info:
      path: Resources/HostApp-Info.plist
      properties:
        CFBundleDisplayName: TCFS
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: "io.tinyland.tcfs"
            CFBundleURLSchemes:
              - tcfs
        NSCameraUsageDescription: "TCFS needs camera access to scan device enrollment QR codes."
        NSFaceIDUsageDescription: "TCFS uses Face ID to unlock your encrypted files."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Resources/HostApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.tinyland.tcfs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tinyland.tcfs.ios
        INFOPLIST_FILE: Resources/HostApp-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/HostApp.entitlements
        PROVISIONING_PROFILE_SPECIFIER: "TCFS iOS App Store"
        SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Generated/tcfs_file_providerFFI.h"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/../../target/aarch64-apple-ios/release $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug"
        OTHER_LDFLAGS: "-ltcfs_file_provider -lc++"
    dependencies:
      - target: TCFSFileProvider

  TCFSFileProvider:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension
      - path: Generated
    info:
      path: Resources/Extension-Info.plist
      properties:
        CFBundleDisplayName: TCFS FileProvider
        NSExtension:
          NSExtensionFileProviderDocumentGroup: group.io.tinyland.tcfs
          NSExtensionFileProviderSupportsDatalessFolders: true
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).TCFSFileProviderExtension"
    entitlements:
      path: Resources/Extension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.tinyland.tcfs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tinyland.tcfs.ios.fileprovider
        INFOPLIST_FILE: Resources/Extension-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Extension.entitlements
        PROVISIONING_PROFILE_SPECIFIER: "TCFS FileProvider App Store"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/../../target/aarch64-apple-ios/release $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug"
        OTHER_LDFLAGS: "-ltcfs_file_provider -lc++"
        SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Generated/tcfs_file_providerFFI.h"
